name: 🪟 • CI

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.hpp"
      - "**/*.cpp"
      - "**/*.cmake"
      - "**/CMakeLists.txt"
      - ".github/workflows/windows.yml"
      - "!bindings/mnt/pyfiction/include/pyfiction/pybind11_mkdoc_docstrings.hpp"
  pull_request:
    branches: ["main"]
    paths:
      - "**/*.hpp"
      - "**/*.cpp"
      - "**/*.cmake"
      - "**/CMakeLists.txt"
      - ".github/workflows/windows.yml"
      - "!bindings/mnt/pyfiction/include/pyfiction/pybind11_mkdoc_docstrings.hpp"
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: pwsh # use pwsh as directory handling does not seem to work with bash

env:
  Z3_VERSION: 4.13.4

jobs:
  build_and_test:
    strategy:
      matrix:
        os: [windows-2022, windows-2025]
        toolset: [v143, ClangCL]
        include:
          - toolset: v143
            cxx_compiler: cl
            c_compiler: cl
          - toolset: ClangCL
            cxx_compiler: clang-cl
            c_compiler: clang-cl

    name: 🪟 ${{matrix.os}} with ${{matrix.toolset}} toolset
    runs-on: ${{matrix.os}}

    steps:
      - name: Clone Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14.x"

      - name: Set up MSVC development environment
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@5ebbd400eff9e74630f759d94ddd7b6c26299639 # v1.2
        with:
          key: "${{matrix.os}}-${{matrix.toolset}}"
          variant: ccache
          save: true
          max-size: 10G

      - name: Setup Z3 Solver
        id: z3
        uses: cda-tum/setup-z3@7bfe87519f27304460db44284cb8cc59f50f5fc9 # v1.7.2
        with:
          version: ${{env.Z3_VERSION}}

      # Build and test pipeline for Debug mode

      - name: Configure CMake (Debug)
        run: >
          cmake -S ${{github.workspace}} --preset ci-debug
          -DCMAKE_CXX_COMPILER=${{matrix.cxx_compiler}}
          -DCMAKE_C_COMPILER=${{matrix.c_compiler}}

      - name: Build (Debug)
        run: cmake --build --preset ci-debug --parallel 4

      - name: Test (Debug)
        run: ctest --preset ci-debug --verbose --repeat until-pass:3 --parallel 4

      # Build and test pipeline for Release mode

      - name: Configure CMake (Release)
        run: >
          cmake -S ${{github.workspace}} --preset ci-release
          -DCMAKE_CXX_COMPILER=${{matrix.cxx_compiler}}
          -DCMAKE_C_COMPILER=${{matrix.c_compiler}}

      - name: Build (Release)
        run: cmake --build --preset ci-release --parallel 4

      - name: Test (Release)
        run: ctest --preset ci-release --verbose --repeat until-pass:3 --parallel 4
